<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>POLIPONI 2026 | Antrian Tiket Resmi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#ece9e9;
overflow:hidden;
color:#000;
}

/* BACKGROUND GRID */
body:before{
content:'';
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(0,0,0,.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,0,0,.06) 1px, transparent 1px);
background-size:32px 32px;
z-index:-1;
}

/* MAIN CARD */
.box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:92%;
max-width:560px;
background:#ffffff;
border:6px solid #000;
box-shadow:18px 18px 0 #000;
padding:26px;
}

/* TITLE */
.logo{
font-size:42px;
font-weight:900;
letter-spacing:2px;
text-align:center;
color:#000;
}

.sub{
margin-top:6px;
text-align:center;
font-size:14px;
letter-spacing:2px;
}

/* COLOR BARS */
.colors{
display:flex;
gap:6px;
justify-content:center;
margin-top:14px;
}

.colors span{
width:38px;
height:18px;
display:block;
}

.c1{background:#ff4d00;}
.c2{background:#f1d100;}
.c3{background:#1ed4e6;}
.c4{background:#00d629;}

/* BADGE */
.badge{
margin:18px auto 0;
display:table;
background:#00d629;
color:#fff;
padding:10px 16px;
font-weight:900;
font-size:14px;
box-shadow:6px 6px 0 #000;
}

/* QUEUE */
.queue{
margin-top:22px;
font-size:22px;
font-weight:900;
text-align:center;
}

.queue span{
color:#ff4d00;
font-size:34px;
}

/* ONLINE */
.online{
margin-top:10px;
text-align:center;
font-size:14px;
}

.online b{
color:#1ed4e6;
}

/* PROGRESS */
.progress-wrap{
margin-top:24px;
height:28px;
background:#fff;
border:4px solid #000;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff4d00 0%,#ff4d00 25%,#f1d100 25%,#f1d100 50%,#1ed4e6 50%,#1ed4e6 75%,#00d629 75%,#00d629 100%);
transition:width 1s linear;
}

/* TEXT */
.loading{
margin-top:12px;
font-size:14px;
font-weight:700;
text-align:center;
}

/* TERMINAL */
.status{
margin-top:18px;
border:4px solid #000;
padding:14px;
background:#fff;
font-size:14px;
line-height:1.8;
font-weight:700;
min-height:150px;
}

/* FOOTER */
.footer{
margin-top:18px;
text-align:center;
font-size:13px;
font-weight:700;
animation:blink 1.1s infinite;
}

@keyframes blink{
0%{opacity:.4;}
50%{opacity:1;}
100%{opacity:.4;}
}

#timer{
display:none;
}

@media(max-width:480px){
.logo{font-size:32px;}
.queue{font-size:18px;}
.queue span{font-size:28px;}
}
</style>
</head>
<body>

<div class="box">

<div class="logo">POLIPONI</div>
<div class="sub">SI PALING KONSER 2026</div>

<div class="colors">
<span class="c1"></span>
<span class="c2"></span>
<span class="c3"></span>
<span class="c4"></span>
</div>

<div class="badge">🎟️ Penambahan Tiket</div>

<div class="queue">
ANDA DALAM ANTRIAN KE <span id="queueNum">40</span>
</div>

<div class="online">
👥 Peserta Online: <b id="onlineNum">382</b> Orang
</div>

<div id="timer">60</div>

<div class="progress-wrap">
<div class="progress" id="bar"></div>
</div>

<div class="loading" id="loadingText">
Memproses akses anda...
</div>

<div class="status" id="status">
> Menghubungkan ke server tiket...<br>
> Memeriksa kuota peserta...<br>
> Menyiapkan akses pembelian...
</div>

<div class="footer">
Mohon tunggu 10 menit, jangan tutup halaman ini...
</div>

</div>

<script>
let time = 60;
let max = 60;
let queue = 40;
let online = 382;

const timer = document.getElementById("timer");
const bar = document.getElementById("bar");
const queueNum = document.getElementById("queueNum");
const onlineNum = document.getElementById("onlineNum");
const status = document.getElementById("status");
const loadingText = document.getElementById("loadingText");

const textList = [
"Memproses akses anda...",
"Menyusun nomor antrian...",
"Memvalidasi peserta...",
"Mengecek sisa tiket...",
"Mempersiapkan halaman pembayaran...",
"Menyambungkan ke server utama..."
];

let txt = 0;


// ===== LOCAL STORAGE POLIPONI =====
const EVENT_KEY="poliponiEvent";
const STATE_KEY="poliponiState";
if(!localStorage.getItem(EVENT_KEY)){
localStorage.setItem(EVENT_KEY,JSON.stringify({
name:"POLIPONI BALI 2026",
date:"04 Juli 2026",
venue:"Bali United Training Center",
ticketOpen:"07 Mei 2026 12.00 WITA",
lineup:["Sheila On 7","Hindia",".Feast","510","Dialog Dini Hari"],
prices:{Festival:300000,Premium:450000,FastTrack:625000}
}));
}
const saved=JSON.parse(localStorage.getItem(STATE_KEY)||"null");
if(saved){time=saved.time;queue=saved.queue;online=saved.online;}

const run = setInterval(() => {

time--;

if(time % 2 == 0 && queue > 1){
queue--;
}

online = online + Math.floor(Math.random()*8)-3;
if(online < 250) online = 250;

timer.innerHTML = time;
queueNum.innerHTML = queue;
onlineNum.innerHTML = online;

let percent = ((max-time)/max)*100;
bar.style.width = percent + "%";

txt++;
if(txt >= textList.length){txt = 0;}
loadingText.innerHTML = textList[txt];

if(time == 50){
status.innerHTML = `
> Server tiket terhubung... OK<br>
> Memindai database peserta... OK<br>
> Menentukan prioritas antrian...
`;
}

if(time == 35){
status.innerHTML = `
> Validasi akses pengguna... OK<br>
> Menyiapkan tiket tambahan... OK<br>
> Sinkronisasi sistem pembayaran...
`;
}

if(time == 20){
status.innerHTML = `
> Tiket masih tersedia... OK<br>
> Menyiapkan halaman checkout...<br>
> Harap tunggu sebentar...
`;
}

if(time == 8){
status.innerHTML = `
> ACCESS GRANTED<br>
> Redirect ke halaman tiket resmi...
`;
}

localStorage.setItem(STATE_KEY,JSON.stringify({time,queue,online}));

if(time <= 0){
localStorage.removeItem(STATE_KEY);
clearInterval(run);
window.location.href="tiket.html";
}

},1000);
</script>

</body>
</html>
